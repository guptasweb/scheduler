default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  timeout: 5000

development:
  <<: *default
  database: db/development.sqlite3

test:
  <<: *default
  database: db/test.sqlite3

# SQLite is fine for small demos; for real production use, prefer Postgres/MySQL.
production:
  <<: *default
  database: db/production.sqlite3

